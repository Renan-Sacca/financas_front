version: "3.8"

services:

  financas-front:

    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    labels:

      - "traefik.enable=true"

      - "traefik.http.routers.financepowder-front.rule=Host(`financepowder.cloud`)"
      - "traefik.http.routers.financepowder-front.entrypoints=websecure"
      - "traefik.http.routers.financepowder-front.tls.certresolver=letsencrypt"

      - "traefik.http.services.financepowder-front.loadbalancer.server.port=80"

    networks:
      - proxy

networks:
  proxy:
    external: true
